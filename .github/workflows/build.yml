name: Build Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Download uv binary
        shell: pwsh
        run: |
          $uvVersion = "0.6.11"
          $url = "https://github.com/astral-sh/uv/releases/download/$uvVersion/uv-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile uv.zip
          Expand-Archive -Path uv.zip -DestinationPath uv-extracted
          Copy-Item "uv-extracted/uv.exe" "src-tauri/binaries/uv-x86_64-pc-windows-msvc.exe"

      - name: Generate default icons
        run: npx tauri icon

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
