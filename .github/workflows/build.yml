name: Build Installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            uv-target: x86_64-pc-windows-msvc
            artifact: windows-installer
          - os: macos-latest
            uv-target: aarch64-apple-darwin
            artifact: macos-installer
          - os: ubuntu-latest
            uv-target: x86_64-unknown-linux-gnu
            artifact: linux-installer

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Download uv binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $uvVersion = "0.6.11"
          $url = "https://github.com/astral-sh/uv/releases/download/$uvVersion/uv-${{ matrix.uv-target }}.zip"
          Invoke-WebRequest -Uri $url -OutFile uv.zip
          Expand-Archive -Path uv.zip -DestinationPath uv-extracted
          Copy-Item "uv-extracted/uv.exe" "src-tauri/uv-${{ matrix.uv-target }}.exe"

      - name: Download uv binary (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          UV_VERSION="0.6.11"
          curl -fsSL "https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-${{ matrix.uv-target }}.tar.gz" -o uv.tar.gz
          tar xzf uv.tar.gz
          cp "uv-${{ matrix.uv-target }}/uv" "src-tauri/uv-${{ matrix.uv-target }}"

      # --- Windows code signing (disabled until certificate is obtained) ---
      # To enable:
      #   1. Obtain a code signing certificate (.pfx)
      #   2. Add GitHub secrets: WINDOWS_CERTIFICATE (base64-encoded .pfx),
      #      WINDOWS_CERTIFICATE_PASSWORD
      #   3. Set certificateThumbprint in src-tauri/tauri.conf.json
      #   4. Uncomment the step below
      #
      # - name: Import code signing certificate
      #   if: runner.os == 'Windows'
      #   shell: pwsh
      #   run: |
      #     $certBytes = [System.Convert]::FromBase64String('${{ secrets.WINDOWS_CERTIFICATE }}')
      #     New-Item -ItemType Directory -Force -Path certificate
      #     [System.IO.File]::WriteAllBytes('certificate\certificate.pfx', $certBytes)
      #     Import-PfxCertificate `
      #       -FilePath certificate\certificate.pfx `
      #       -CertStoreLocation Cert:\CurrentUser\My `
      #       -Password (ConvertTo-SecureString -String '${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}' -Force -AsPlainText)
      #     Remove-Item certificate\certificate.pfx

      - name: Set version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to $VERSION"
          # Update tauri.conf.json
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
          # Update Cargo.toml
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          # Update package.json
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          rm -f package.json.bak

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload installer artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload installer artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*
            artifacts/macos-installer/*
            artifacts/linux-installer/*
