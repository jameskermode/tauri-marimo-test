<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mograder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.1rem; flex: 1; }
    #status-badge {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 12px;
      background: #333;
      color: #999;
    }
    #status-badge.ready { background: #1b3a2a; color: #4ade80; }

    /* Setup screen */
    #setup {
      display: none;
      flex: 1;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    #setup .card {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    #setup h2 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }
    #setup p {
      color: #999;
      font-size: 0.9rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    #setup input {
      width: 100%;
      padding: 10px 14px;
      background: #2a2a4a;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    #setup input:focus { outline: none; border-color: #6c63ff; }
    #setup button {
      padding: 10px 28px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #setup button:hover { background: #5a52d5; }
    #setup button:disabled { background: #444; cursor: default; }
    #setup .error { color: #f87171; font-size: 0.85rem; margin-top: 8px; }

    /* Log panel */
    #log {
      flex: 1;
      padding: 12px 24px;
      overflow-y: auto;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #888;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-info { color: #999; }
    .log-ready { color: #4ade80; }
    .log-error { color: #f87171; }
    #reset-link {
      color: #666;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: underline;
    }
    #reset-link:hover { color: #999; }
  </style>
</head>
<body>
  <header>
    <h1>mograder</h1>
    <span id="reset-link" style="display:none" onclick="resetCourse()">Change course</span>
    <span id="status-badge">initializing...</span>
  </header>

  <!-- First-launch setup screen -->
  <div id="setup">
    <div class="card">
      <h2>Course Setup</h2>
      <p>Paste the course configuration URL provided by your instructor.</p>
      <input id="course-url" type="url" placeholder="https://example.com/path/to/mograder.toml" />
      <button id="setup-btn" onclick="submitSetup()">Connect</button>
      <div id="setup-error" class="error"></div>
    </div>
  </div>

  <!-- Loading / log panel -->
  <div id="log"></div>

  <script>
    const MARIMO_URL = "http://127.0.0.1:2718";
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;
    const logEl = document.getElementById("log");
    const badge = document.getElementById("status-badge");
    const setupEl = document.getElementById("setup");
    let ready = false;
    let courseDir = null;

    function log(msg, cls = "log-info") {
      const line = document.createElement("div");
      line.className = cls;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Listen for sidecar output
    listen("sidecar-output", (event) => { log(event.payload, "log-info"); });
    listen("sidecar-error", (event) => { log(event.payload, "log-error"); });

    // Ask Rust for app state on load
    invoke("get_app_state").then((state) => {
      courseDir = state.courseDir;
      if (state.hasConfig) {
        document.getElementById("reset-link").style.display = "inline";
        startDashboard(courseDir);
      } else {
        showSetup();
      }
    }).catch((e) => {
      log("Failed to initialize: " + e, "log-error");
    });

    async function resetCourse() {
      if (!confirm("Remove current course configuration and return to setup?")) return;
      try {
        await invoke("reset_course");
        document.getElementById("reset-link").style.display = "none";
        showSetup();
      } catch (e) {
        log("Reset failed: " + e, "log-error");
      }
    }

    function showSetup() {
      badge.textContent = "setup";
      setupEl.style.display = "flex";
      logEl.style.display = "none";
      document.getElementById("course-url").focus();
    }

    function showLoading() {
      setupEl.style.display = "none";
      logEl.style.display = "block";
      badge.textContent = "starting...";
      badge.className = "";
    }

    async function submitSetup() {
      const url = document.getElementById("course-url").value.trim();
      const errEl = document.getElementById("setup-error");
      errEl.textContent = "";
      if (!url) { errEl.textContent = "Please enter a URL."; return; }
      if (!url.startsWith("http")) { errEl.textContent = "URL must start with http:// or https://"; return; }

      document.getElementById("setup-btn").disabled = true;
      showLoading();
      log("Setting up course from: " + url);
      log("Installing mograder + dependencies (first launch may take a few minutes).");

      try {
        await invoke("launch_dashboard", { courseDirOrUrl: url });
        pollForDashboard();
      } catch (e) {
        log("Failed to launch: " + e, "log-error");
        showSetup();
        errEl.textContent = "Launch failed. Check the URL and try again.";
        document.getElementById("setup-btn").disabled = false;
      }
    }

    async function startDashboard(dir) {
      showLoading();
      log("Launching mograder student dashboard...");
      log("Installing mograder + dependencies (first launch may take a few minutes).");
      try {
        await invoke("launch_dashboard", { courseDirOrUrl: dir });
        pollForDashboard();
      } catch (e) {
        log("Failed to launch: " + e, "log-error");
      }
    }

    let attempts = 0;
    function pollForDashboard() {
      attempts++;
      fetch(MARIMO_URL, { mode: "no-cors" })
        .then(() => {
          if (!ready) {
            ready = true;
            badge.textContent = "ready";
            badge.className = "ready";
            log("Dashboard is ready, loading...", "log-ready");
            window.location.href = MARIMO_URL;
          }
        })
        .catch(() => {
          if (attempts % 5 === 0) {
            log(`Waiting for server... (attempt ${attempts})`);
          }
          setTimeout(pollForDashboard, 1000);
        });
    }

    // Allow Enter key in URL input
    document.getElementById("course-url").addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitSetup();
    });
  </script>
</body>
</html>
