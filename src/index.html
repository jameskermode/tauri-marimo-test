<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>marimo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .container { text-align: center; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #333;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { font-size: 0.9rem; color: #999; }
    #status { margin-top: 16px; font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Starting marimo…</h1>
    <p>Installing Python packages on first launch — this may take a minute.</p>
    <div id="status"></div>
  </div>
  <script>
    const MARIMO_URL = "http://127.0.0.1:2718";
    const statusEl = document.getElementById("status");
    let attempts = 0;

    async function poll() {
      attempts++;
      statusEl.textContent = `Checking… (attempt ${attempts})`;
      try {
        await fetch(MARIMO_URL, { mode: "no-cors" });
        // If fetch doesn't throw, the server is up
        window.location.replace(MARIMO_URL);
      } catch {
        setTimeout(poll, 1000);
      }
    }

    poll();
  </script>
</body>
</html>
