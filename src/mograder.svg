<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line {
        stroke: #0AAD69;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .grid {
        stroke: #0AAD69;
        stroke-width: 6;
        stroke-linecap: round;
        opacity: 0.5;
      }
      .text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 36px;
        fill: #1f2937;
      }
    </style>
  </defs>

  <!-- Rounded square -->
  <rect x="28" y="28" width="200" height="200" rx="36" class="line"></rect>

  <!-- Grid (3x3) -->
  <!-- Vertical lines -->
  <line x1="96" y1="64" x2="96" y2="192" class="grid"></line>
  <line x1="160" y1="64" x2="160" y2="192" class="grid"></line>

  <!-- Horizontal lines -->
  <line x1="64" y1="96" x2="192" y2="96" class="grid"></line>
  <line x1="64" y1="160" x2="192" y2="160" class="grid"></line>

  <!-- Checkmark (top-right cell) -->
  <path d="M150 80 L170 100 L200 60" class="line"></path>
</svg>